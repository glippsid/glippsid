<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLIPPS.ID — Transforming Ideas Into Digital Reality</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #020d1e; font-family: 'Ubuntu', sans-serif; color: #eef4ff; }

    canvas { position: fixed; inset: 0; z-index: 0; }

    /* scanlines */
    .scanlines {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(22,87,255,0.025) 3px, rgba(22,87,255,0.025) 4px);
    }

    .stage {
      position: relative; z-index: 2;
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto 1fr;
      align-items: center;
      padding: 0 clamp(1.5rem, 6vw, 6rem);
    }

    /* nav */
    .nav {
      align-self: start;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 2rem;
      opacity: 0;
      animation: up 0.6s 0.8s forwards;
    }
    .nav-logo {
      font-size: 0.72rem; font-weight: 500;
      letter-spacing: 0.22em;
      color: rgba(197,216,255,0.35);
    }
    .nav-badge {
      font-size: 0.65rem; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: #4a7fff;
      border: 1px solid rgba(22,87,255,0.45);
      padding: 0.28rem 0.85rem;
      border-radius: 2px;
    }

    /* hero */
    .hero { align-self: center; }

    .eyebrow {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.68rem; font-weight: 400;
      letter-spacing: 0.32em; text-transform: uppercase;
      color: #4a7fff; margin-bottom: 1.2rem;
      opacity: 0; animation: up 0.6s 0.1s forwards;
    }
    .eyebrow-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #4a7fff;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.35; transform:scale(0.65); }
    }

    .wordmark {
      font-size: clamp(3.5rem, 11vw, 9rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 0.92;
      opacity: 0; animation: up 0.8s 0.2s forwards;
    }
    .wordmark .g { color: #eef4ff; }
    .wordmark .id { color: #1657ff; }

    .rule {
      width: 2.5rem; height: 2px;
      background: #1657ff;
      margin: 1.8rem 0;
      opacity: 0; animation: up 0.6s 0.3s forwards;
    }

    .sub {
      font-size: clamp(0.9rem, 1.8vw, 1.05rem);
      font-weight: 300; color: #c5d8ff;
      max-width: 34ch; line-height: 1.65;
      opacity: 0; animation: up 0.6s 0.4s forwards;
    }

    /* form */
    .form-wrap {
      margin-top: 2.6rem;
      opacity: 0; animation: up 0.6s 0.55s forwards;
    }
    .form-label {
      font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(197,216,255,0.3); margin-bottom: 0.55rem;
    }
    .form-row { display: flex; max-width: 380px; }
    .form-row input {
      flex: 1;
      background: rgba(4,18,42,0.85);
      border: 1px solid rgba(74,127,255,0.25); border-right: none;
      border-radius: 3px 0 0 3px;
      padding: 0.76rem 1rem;
      font-family: 'Ubuntu', sans-serif; font-size: 0.83rem;
      color: #eef4ff; outline: none;
      transition: border-color 0.2s;
    }
    .form-row input::placeholder { color: rgba(197,216,255,0.3); }
    .form-row input:focus { border-color: rgba(74,127,255,0.6); }
    .form-row button {
      background: #1657ff; border: 1px solid #1657ff;
      border-radius: 0 3px 3px 0;
      padding: 0.76rem 1.3rem;
      font-family: 'Ubuntu', sans-serif; font-size: 0.78rem; font-weight: 500;
      color: #fff; cursor: pointer; letter-spacing: 0.06em;
      transition: background 0.2s; white-space: nowrap;
    }
    .form-row button:hover { background: #3d6fff; }

    .thanks {
      display: none; margin-top: 0.6rem;
      font-size: 0.82rem; color: #4a7fff; letter-spacing: 0.08em;
    }

    /* bottom */
    .bottom {
      align-self: end; padding-bottom: 2rem;
      display: flex; align-items: center; gap: 1.5rem;
      opacity: 0; animation: up 0.6s 0.9s forwards;
    }
    .bottom-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(74,127,255,0.35), transparent);
    }
    .bottom-text {
      font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(197,216,255,0.18); white-space: nowrap;
    }

    @keyframes up {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; opacity: 1 !important; }
    }
    @media (max-width: 600px) {
      .wordmark { font-size: 3.2rem; }
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>
<div class="scanlines"></div>

<div class="stage">
  <nav class="nav">
    <span class="nav-logo">GLIPPS.ID</span>
    <span class="nav-badge">Transforming Ideas Into Digital Reality.</span>
  </nav>

  <main class="hero">
    <p class="eyebrow"><span class="eyebrow-dot"></span>Something great is on its way</p>
    <h1 class="wordmark"><span class="g">GLIPPS.ID</span><span class="id">.ID</span></h1>
    <div class="rule"></div>
    <p class="sub">Delivering innovative digital solutions for businesses ready to grow. We're crafting something new.</p>

    <div class="form-wrap">
      <p class="form-label">Get notified</p>
      <div class="form-row" id="formRow">
        <input type="email" placeholder="your@email.com" id="emailInput" autocomplete="off" />
        <button onclick="handleSubmit()">Notify me</button>
      </div>
      <p class="thanks" id="thanks">✓ &nbsp;You're on the list. We'll be in touch.</p>
    </div>
  </main>

  <footer class="bottom">
    <div class="bottom-line"></div>
    <span class="bottom-text">© 2026 Glipps.id — All rights reserved</span>
  </footer>
</div>

<script>
  function handleSubmit() {
    const input = document.getElementById('emailInput');
    if (!input.value || !input.value.includes('@')) { input.focus(); return; }
    document.getElementById('formRow').style.display = 'none';
    const t = document.getElementById('thanks');
    t.style.display = 'block';
  }

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H, particles, mouse = { x: -9999, y: -9999 };

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    init();
  }

  function init() {
    const count = Math.floor((W * H) / 8500);
    particles = Array.from({ length: count }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 1.6 + 0.4,
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    const CONN = 120, MOUSE_CONN = 160;

    for (let i = 0; i < particles.length; i++) {
      const a = particles[i];

      // mouse line
      const mdx = a.x - mouse.x, mdy = a.y - mouse.y;
      const md = Math.sqrt(mdx*mdx + mdy*mdy);
      if (md < MOUSE_CONN) {
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(mouse.x, mouse.y);
        ctx.strokeStyle = `rgba(74,127,255,${(1 - md/MOUSE_CONN) * 0.55})`;
        ctx.lineWidth = 0.7;
        ctx.stroke();
      }

      // particle lines
      for (let j = i + 1; j < particles.length; j++) {
        const b = particles[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < CONN) {
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `rgba(74,127,255,${(1 - d/CONN) * 0.15})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    // dots
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(74,127,255,0.6)';
      ctx.fill();
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });

  resize(); draw();
</script>
</body>
</html>
